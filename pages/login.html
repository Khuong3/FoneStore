<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h3 class="text-center text-primary mb-4">Đăng nhập</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" id="btnLogin" class="btn btn-primary w-100">Đăng nhập</button>
                    <p class="mt-3 text-center">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { handleLogin } from '../js/auth.js';

    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        await handleLogin(email, password);
    });
</script>
</body>
</html>
