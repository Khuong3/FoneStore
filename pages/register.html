<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">FoneStore</h3>
                    <p class="text-muted">Tạo tài khoản mới</p>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="tel" id="phone" class="form-control" placeholder="090xxxxxxx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" id="address" class="form-control" placeholder="Số nhà, tên đường..." required>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 py-2 fw-bold">ĐĂNG KÝ NGAY</button>
                    
                    <div class="text-center mt-3">
                        <span>Đã có tài khoản? <a href="login.html" class="text-decoration-none">Đăng nhập</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // Quan trọng: Phải đúng đường dẫn tới file auth.js
    import { handleRegister } from '../js/auth.js';

    const registerForm = document.getElementById('registerForm');
    const btnSubmit = document.getElementById('btnSubmit');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Chặn load lại trang

        // Vô hiệu hóa nút để tránh bấm nhiều lần
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Đang xử lý...";

        // Thu thập dữ liệu
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const info = {
            fullName: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value
        };

        // Gọi hàm từ auth.js
        await handleRegister(email, password, info);

        // Kích hoạt lại nút nếu có lỗi (nếu thành công trang sẽ tự chuyển đi)
        btnSubmit.disabled = false;
        btnSubmit.innerText = "ĐĂNG KÝ NGAY";
    });
</script>

</body>
</html>
