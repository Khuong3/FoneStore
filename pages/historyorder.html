<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đơn hàng - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-arrow-left"></i> Quay lại</a>
            <span class="navbar-text text-white">Đơn hàng của tôi</span>
        </div>
    </nav>

    <div class="container">
        <div id="order-list" class="row">
            <div class="text-center py-5" id="loading-spinner">
                <div class="spinner-border text-primary"></div>
                <p>Đang tải đơn hàng...</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Đảm bảo đường dẫn config.js chính xác (ví dụ ./js/config.js)
        import { auth, db } from './js/config.js'; 
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            const container = document.getElementById('order-list');
            
            if (!user) { 
                container.innerHTML = '<div class="alert alert-warning">Vui lòng đăng nhập để xem lịch sử.</div>';
                return; 
            }

            try {
                // KIỂM TRA: Collection tên là 'orders', field chứa UID là 'customerUID'
                const q = query(collection(db, "orders"), where("customerUID", "==", user.uid));
                const snap = await getDocs(q);
                
                document.getElementById('loading-spinner').style.display = 'none';

                if (snap.empty) {
                    container.innerHTML = `
                        <div class="text-center mt-5">
                            <i class="bi bi-cart-x" style="font-size: 3rem; color: #ccc;"></i>
                            <h5 class="mt-3">Bạn chưa có đơn hàng nào</h5>
                            <a href="index.html" class="btn btn-primary mt-2">Mua sắm ngay</a>
                        </div>`;
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const order = doc.data();
                    // Xử lý ngày tháng từ Firebase Timestamp
                    const dateDisplay = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleString('vi-VN') : (order.createdAt || 'N/A');
                    
                    html += `
                        <div class="col-12 mb-3">
                            <div class="card border-0 shadow-sm">
                                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                                    <span class="fw-bold text-primary">Mã đơn: #${doc.id.substring(0,8)}</span>
                                    <span class="badge bg-success">${order.status || 'Hoàn thành'}</span>
                                </div>
                                <div class="card-body">
                                    <p class="small text-muted mb-3"><i class="bi bi-calendar3"></i> Ngày đặt: ${dateDisplay}</p>
                                    <div class="table-responsive">
                                        <table class="table table-borderless align-middle">
                                            <thead class="table-light">
                                                <tr class="small text-uppercase">
                                                    <th>Sản phẩm</th>
                                                    <th class="text-center">SL</th>
                                                    <th class="text-end">Thành tiền</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${order.items.map(item => `
                                                    <tr>
                                                        <td>
                                                            <div class="d-flex align-items-center">
                                                                <img src="${item.img}" width="40" class="me-2 rounded">
                                                                <span>${item.name}</span>
                                                            </div>
                                                        </td>
                                                        <td class="text-center">x${item.quantity}</td>
                                                        <td class="text-end fw-bold">${Number(item.price * item.quantity).toLocaleString()}đ</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="border-top pt-3 d-flex justify-content-between align-items-center">
                                        <span class="text-muted small">Hình thức: Thanh toán khi nhận hàng</span>
                                        <h5 class="text-danger fw-bold mb-0">Tổng: ${Number(order.totalAmount).toLocaleString()}đ</h5>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error("Lỗi lấy đơn hàng:", err);
                container.innerHTML = '<div class="alert alert-danger text-center">Có lỗi xảy ra khi tải dữ liệu đơn hàng.</div>';
            }
        });
    </script>
</body>
</html>
