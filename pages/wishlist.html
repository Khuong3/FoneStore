<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách yêu thích - FoneStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .wishlist-title {
            font-weight: 700;
            color: #212529;
        }

        .wishlist-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
        }

        .wishlist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }

        .wishlist-img {
            height: 180px;
            object-fit: contain;
            padding: 20px;
            background: #fff;
        }

        .empty-box {
            background: #fff;
            border-radius: 18px;
            padding: 60px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        .price-text {
            font-size: 1rem;
            font-weight: 700;
            color: #dc3545;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="header-container"></div>

    <div class="container mt-5 mb-5">
        <h2 class="mb-4 wishlist-title">Sản phẩm bạn yêu thích ❤️</h2>
        <div id="wishlist-content" class="row g-4"></div>

        <div class="mt-4">
            <a href="../home.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase / layout -->
    <script type="module">
        import { loadLayout } from '../js/layout.js';
        await loadLayout();
    </script>

    <script>
        function renderWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const container = document.getElementById('wishlist-content');

            if (wishlist.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="empty-box text-center">
                            <i class="bi bi-heart fs-1 text-danger"></i>
                            <h4 class="mt-3">Bạn chưa thích sản phẩm nào</h4>
                            <p class="text-muted">Hãy quay lại và thêm những món bạn yêu thích nhé.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = wishlist.map(item => `
                <div class="col-md-3 col-sm-6">
                    <div class="card wishlist-card h-100 shadow-sm">
                        <a href="product-detail.html?id=${item.id}">
                            <img src="${item.img}" class="card-img-top wishlist-img" alt="${item.name}">
                        </a>
                        <div class="card-body text-center">
                            <h6 class="fw-bold">${item.name}</h6>
                            <p class="price-text">${Number(item.price || 0).toLocaleString()}đ</p>
                            <div class="d-grid gap-2">
                                <button class="btn btn-danger btn-sm" onclick="removeFromWishlist('${item.id}')">
                                    <i class="bi bi-trash"></i> Xóa khỏi danh sách
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.removeFromWishlist = (id) => {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            wishlist = wishlist.filter(item => item.id !== id);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            renderWishlist();
        };

        renderWishlist();
    </script>
</body>
</html>
