<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách yêu thích - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Sản phẩm bạn yêu thích ❤️</h2>
        <div id="wishlist-content" class="row g-4"></div>
        <div class="mt-4"><a href="../home.html" class="btn btn-secondary">Tiếp tục mua sắm</a></div>
    </div>

    <script>
        function renderWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const container = document.getElementById('wishlist-content');
            
            if (wishlist.length === 0) {
                container.innerHTML = "<p class='text-center'>Bạn chưa thích sản phẩm nào.</p>";
                return;
            }

            container.innerHTML = wishlist.map(item => `
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm border-0">
                        <img src="${item.img}" class="card-img-top" style="height:150px; object-fit:contain">
                        <div class="card-body text-center">
                            <h6>${item.name}</h6>
                            <button class="btn btn-danger btn-sm" onclick="removeFromWishlist('${item.id}')">Xóa khỏi danh sách</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.removeFromWishlist = (id) => {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            wishlist = wishlist.filter(item => item.id !== id);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            renderWishlist();
        };

        renderWishlist();
    </script>
</body>
</html>
