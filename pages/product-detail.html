<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin sản phẩm - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .spec-label { width: 40%; font-weight: 600; color: #555; background-color: #f8f9fa; }
        .carousel-item img { height: 450px; object-fit: contain; background-color: #fff; }
        .carousel-indicators [data-bs-target] { background-color: #000; width: 10px; height: 10px; border-radius: 50%; }
        .carousel-control-prev-icon, .carousel-control-next-icon { filter: invert(1); }
        .sticky-md-top { top: 20px; }
        .table-specs td { padding: 12px; font-size: 14px; border-bottom: 1px solid #eee; }
        .img-out-of-stock { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../home.html"><i class="bi bi-arrow-left"></i> FoneStore</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="product-detail-container" class="bg-white p-4 shadow-sm rounded">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Đang tải thông tin sản phẩm...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { auth, db } from '../js/config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
        // BỔ SUNG: Import Firebase Functions
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js";

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let userUID = null;
        let productData = null;

        // Khởi tạo Functions
        const functions = getFunctions();
        const createMoMoPayment = httpsCallable(functions, 'createMoMoPayment');

        onAuthStateChanged(auth, (user) => {
            userUID = user ? user.uid : null;
        });

        async function fetchDetail() {
            const container = document.getElementById('product-detail-container');
            if (!productId) {
                container.innerHTML = `<div class="alert alert-warning text-center">Lỗi: Không tìm thấy ID sản phẩm.</div>`;
                return;
            }

            try {
                const docRef = doc(db, "products", productId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    productData = docSnap.data();
                    const p = productData;
                    const s = p.specs || {}; 
                    
                    const isOutOfStock = (p.stock === undefined || p.stock <= 0);
                    const imgList = (p.images && p.images.length > 0) ? p.images : [p.img];

                    const indicatorsHtml = imgList.map((_, index) => 
                        `<button type="button" data-bs-target="#productCarousel" data-bs-slide-to="${index}" class="${index === 0 ? 'active' : ''}"></button>`
                    ).join('');

                    const slidesHtml = imgList.map((url, index) => 
                        `<div class="carousel-item ${index === 0 ? 'active' : ''}">
                            <img src="${url}" class="d-block w-100 ${isOutOfStock ? 'img-out-of-stock' : ''}" alt="Slide ${index + 1}">
                        </div>`
                    ).join('');

                    container.innerHTML = `
                        <div class="row g-5">
                            <div class="col-md-6">
                                <div class="sticky-md-top">
                                    <div class="position-relative">
                                        <div id="productCarousel" class="carousel slide border rounded shadow-sm" data-bs-ride="carousel">
                                            <div class="carousel-indicators">${indicatorsHtml}</div>
                                            <div class="carousel-inner">${slidesHtml}</div>
                                            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                                                <span class="carousel-control-prev-icon"></span>
                                            </button>
                                            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                                                <span class="carousel-control-next-icon"></span>
                                            </button>
                                        </div>
                                        ${isOutOfStock ? '<div class="position-absolute top-50 start-50 translate-middle badge bg-danger fs-4 shadow">HẾT HÀNG</div>' : ''}
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <h1 class="fw-bold mb-2">${p.name}</h1>
                                <div class="d-flex align-items-center mb-3">
                                    <h2 class="text-danger fw-bold m-0">${Number(p.price).toLocaleString()}đ</h2>
                                    <span class="ms-3 badge bg-light text-dark border">Kho còn: ${p.stock || 0}</span>
                                </div>
                                
                                <div class="mb-4">
                                    <h5 class="fw-bold border-bottom pb-2 text-primary"><i class="bi bi-info-circle"></i> Mô tả</h5>
                                    <p class="text-muted" style="white-space: pre-line;">${p.description || "Đang cập nhật..."}</p>
                                </div>

                                <div class="mb-4">
                                    <h5 class="fw-bold border-bottom pb-2 text-primary"><i class="bi bi-cpu"></i> Thông số kỹ thuật</h5>
                                    <div class="table-responsive">
                                        <table class="table table-specs mb-0">
                                            <tr><td class="spec-label">Hệ điều hành:</td><td>${s.os || '---'}</td></tr>
                                            <tr><td class="spec-label">Chip (CPU):</td><td>${s.cpu || '---'}</td></tr>
                                            <tr><td class="spec-label">RAM:</td><td>${s.ram || '---'}</td></tr>
                                            <tr><td class="spec-label">Bộ nhớ:</td><td>${s.rom || '---'}</td></tr>
                                            <tr><td class="spec-label">Màn hình:</td><td>${s.screen || '---'}</td></tr>
                                            <tr><td class="spec-label">Camera sau:</td><td>${s.backCam || '---'}</td></tr>
                                            <tr><td class="spec-label">Camera trước:</td><td>${s.frontCam || '---'}</td></tr>
                                            <tr><td class="spec-label">Thẻ nhớ:</td><td>${s.microSD || '---'}</td></tr>
                                            <tr><td class="spec-label">GPU:</td><td>${s.gpu || '---'}</td></tr>
                                            <tr><td class="spec-label">Pin:</td><td>${s.battery || '---'}</td></tr>
                                        </table>
                                    </div>
                                </div>

                                <div class="d-grid gap-2 pt-3">
                                    <button id="btn-add-to-cart" class="btn ${isOutOfStock ? 'btn-secondary disabled' : 'btn-success'} btn-lg fw-bold">
                                        <i class="bi bi-cart-plus"></i> THÊM VÀO GIỎ HÀNG
                                    </button>
                                    <button id="btn-buy-now" class="btn ${isOutOfStock ? 'btn-secondary disabled' : 'btn-primary'} btn-lg fw-bold">
                                        <i class="bi bi-wallet2"></i> MUA NGAY QUA MOMO
                                    </button>
                                    <button id="btn-wishlist" class="btn btn-outline-danger btn-lg">
                                        <i class="bi bi-heart"></i> Lưu vào yêu thích
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('btn-add-to-cart').onclick = addToCart;
                    document.getElementById('btn-buy-now').onclick = buyNowMoMo;
                    document.getElementById('btn-wishlist').onclick = addToWishlist;

                } else {
                    container.innerHTML = `<div class="alert alert-danger text-center">Sản phẩm không tồn tại.</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-danger text-center">Lỗi: ${error.message}</div>`;
            }
        }

        // --- GIỮ NGUYÊN LOGIC THÊM VÀO GIỎ ---
        async function addToCart() {
            if (!userUID) return alert("Vui lòng đăng nhập!");
            const btn = document.getElementById('btn-add-to-cart');
            btn.disabled = true;

            try {
                await runTransaction(db, async (transaction) => {
                    const productRef = doc(db, "products", productId);
                    const cartRef = doc(db, "carts", userUID);
                    const pSnap = await transaction.get(productRef);
                    const currentStock = pSnap.data().stock || 0;
                    if (currentStock <= 0) throw "Hết hàng!";

                    const cSnap = await transaction.get(cartRef);
                    let items = cSnap.exists() ? cSnap.data().items : [];
                    const exist = items.find(i => i.id === productId);

                    transaction.update(productRef, { stock: currentStock - 1 });
                    if (exist) exist.quantity += 1;
                    else items.push({ id: productId, name: productData.name, price: productData.price, img: productData.img, quantity: 1 });

                    transaction.set(cartRef, { items }, { merge: true });
                });
                alert("Đã thêm vào giỏ!");
                fetchDetail();
            } catch (e) { alert(e); btn.disabled = false; }
        }

        // --- BỔ SUNG LOGIC MUA NGAY DÙNG FIREBASE FUNCTIONS ---
        async function buyNowMoMo() {
            if (!userUID) return alert("Vui lòng đăng nhập!");
            const btn = document.getElementById('btn-buy-now');
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Đang kết nối MoMo...`;
            btn.disabled = true;

            try {
                const userDoc = await getDoc(doc(db, "users", userUID));
                const userData = userDoc.exists() ? userDoc.data() : {};
                
                // Chuẩn bị thông tin đơn hàng
                const orderDescription = `Mua nhanh - ${productData.name}`;

                // Gọi Cloud Function thay vì fetch tới localhost:3000
                const result = await createMoMoPayment({
                    amount: productData.price,
                    orderInfo: orderDescription
                });

                const data = result.data;

                if (data.success && data.payUrl) {
                    // Lưu sản phẩm đơn lẻ vào pending để xử lý sau khi thanh toán xong
                    localStorage.setItem('pending_items', JSON.stringify([{ ...productData, id: productId, quantity: 1 }]));
                    window.location.href = data.payUrl;
                } else { 
                    throw (data.message || "Lỗi tạo link thanh toán!"); 
                }
            } catch (e) { 
                console.error("Lỗi mua ngay qua MoMo:", e);
                alert("Lỗi: " + (e.message || e)); 
                btn.innerHTML = '<i class="bi bi-wallet2"></i> MUA NGAY QUA MOMO'; 
                btn.disabled = false; 
            }
        }

        // --- GIỮ NGUYÊN LOGIC WISHLIST ---
        function addToWishlist() {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            if(!wishlist.find(i => i.id === productId)) {
                wishlist.push({ id: productId, name: productData.name, price: productData.price, img: productData.img });
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                alert("Đã lưu yêu thích!");
            }
        }

        fetchDetail();
    </script>
</body>
</html>
