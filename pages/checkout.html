<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - FStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Thư viện cần thiết cho MoMo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.2/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row g-5">
            <div class="col-md-7">
                <h4 class="mb-3 fw-bold">Thông tin nhận hàng</h4>
                <div class="card shadow-sm p-4">
                    <form id="checkout-form">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" id="ship-name" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" id="ship-phone" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Địa chỉ chi tiết</label>
                                <input type="text" id="ship-address" class="form-control" placeholder="Số nhà, tên đường..." required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Ghi chú (Tùy chọn)</label>
                                <textarea id="ship-note" class="form-control" rows="2"></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h4 class="mb-3 fw-bold">Phương thức thanh toán</h4>
                        <div class="my-3">
                            <div class="form-check border p-3 rounded mb-2">
                                <input id="momo" name="paymentMethod" type="radio" class="form-check-input" checked required>
                                <label class="form-check-label d-flex align-items-center" for="momo">
                                    <img src="https://developers.momo.vn/v3/assets/images/logo-custom.png" width="24" class="me-2">
                                    Thanh toán qua Ví MoMo
                                </label>
                            </div>
                            <div class="form-check border p-3 rounded opacity-50">
                                <input id="cod" name="paymentMethod" type="radio" class="form-check-input" disabled>
                                <label class="form-check-label" for="cod">Thanh toán khi nhận hàng (COD) - Đang bảo trì</label>
                            </div>
                        </div>

                        <button class="w-100 btn btn-primary btn-lg mt-3" type="button" id="btn-momo-pay">
                            <i class="bi bi-wallet2"></i> Thanh toán bằng MoMo
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-5">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fw-bold">Giỏ hàng của bạn</span>
                    <span class="badge bg-primary rounded-pill" id="cart-count-badge">0</span>
                </h4>
                <ul class="list-group mb-3 shadow-sm" id="checkout-cart-items"></ul>

                <div class="card p-3 shadow-sm">
                    <div class="d-flex justify-content-between">
                        <span>Tạm tính:</span>
                        <strong id="subtotal">0đ</strong>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Phí vận chuyển:</span>
                        <strong class="text-success">Miễn phí</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <h5>Tổng cộng:</h5>
                        <h4 class="text-danger fw-bold" id="total-amount">0đ</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../js/config.js';
        import { doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

        let currentUserData = null;
        let cart = [];

        // ==================== THÔNG TIN MO MO SANDBOX - BẠN PHẢI THAY VÀO ĐÂY ====================
       const PARTNER_CODE = "MOMOQFSH20250717_TEST";     // Ví dụ: MOMO1234567890
const ACCESS_KEY   = "m1rfCAFskm5T7ec6";
const SECRET_KEY   = "JSyZ4UGLYE5lEX1oZIOTJwVvTtVPz4G2";
        // ====================================================================================

        // Tự động điền thông tin người dùng từ Firestore
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    document.getElementById('ship-name').value = currentUserData.fullName || "";
                    document.getElementById('ship-phone').value = currentUserData.phone || "";
                    document.getElementById('ship-address').value = currentUserData.address || "";
                }
                loadCheckoutCart(user.uid);
            } else {
                alert("Vui lòng đăng nhập để thanh toán!");
                window.location.href = "login.html";
            }
        });

        // Load giỏ hàng từ Firestore
        async function loadCheckoutCart(uid) {
            try {
                const cartSnap = await getDoc(doc(db, "carts", uid));
                if (cartSnap.exists()) {
                    cart = cartSnap.data().items || [];
                    renderCart();
                } else {
                    cart = [];
                    renderCart();
                }
            } catch (e) {
                console.error("Lỗi load giỏ hàng:", e);
            }
        }

        function renderCart() {
            const container = document.getElementById('checkout-cart-items');
            let total = 0;
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = `<li class="list-group-item text-center text-muted">Giỏ hàng trống</li>`;
            }

            cart.forEach(item => {
                total += item.price * item.quantity;
                container.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between lh-sm">
                        <div>
                            <h6 class="my-0">${item.name}</h6>
                            <small class="text-muted">SL: ${item.quantity}</small>
                        </div>
                        <span class="text-muted">${(item.price * item.quantity).toLocaleString()}đ</span>
                    </li>
                `;
            });

            document.getElementById('cart-count-badge').innerText = cart.length;
            document.getElementById('subtotal').innerText = total.toLocaleString() + "đ";
            document.getElementById('total-amount').innerText = total.toLocaleString() + "đ";
        }

        // ====================== THANH TOÁN MOMO TRỰC TIẾP ======================
        async function payWithMoMo() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            if (total <= 0) return alert("Giỏ hàng trống!");

            if (!PARTNER_CODE || PARTNER_CODE === "YOUR_PARTNER_CODE_HERE") {
                return alert("Vui lòng thay thông tin PARTNER_CODE, ACCESS_KEY, SECRET_KEY vào code!");
            }

            const requestId = Date.now().toString();
            const orderId = "FSTORE_" + Date.now();
            const orderInfo = "Thanh toán đơn hàng FoneStore";

            // Tạo signature
            const rawSignature = `accessKey=${ACCESS_KEY}&amount=${total}&extraData=&ipnUrl=http://localhost&orderId=${orderId}&orderInfo=${orderInfo}&partnerCode=${PARTNER_CODE}&redirectUrl=http://localhost:5500/checkout-success.html&requestId=${requestId}&requestType=payWithMethod`;

            const signature = CryptoJS.HmacSHA256(rawSignature, SECRET_KEY).toString(CryptoJS.enc.Hex);

            const requestBody = {
                partnerCode: PARTNER_CODE,
                partnerName: "FoneStore",
                requestId: requestId,
                amount: total,
                orderId: orderId,
                orderInfo: orderInfo,
                redirectUrl: "http://localhost:5500/checkout-success.html",
                ipnUrl: "http://localhost",
                lang: "vi",
                extraData: "",
                requestType: "payWithMethod",
                signature: signature
            };

            try {
                const response = await axios.post(
                    "https://test-payment.momo.vn/v2/gateway/api/create",
                    requestBody
                );

                if (response.data && response.data.payUrl) {
                    // Lưu thông tin đơn hàng tạm thời
                    localStorage.setItem('pendingOrder', JSON.stringify({
                        orderId: orderId,
                        items: cart,
                        total: total,
                        userInfo: {
                            fullName: document.getElementById('ship-name').value,
                            phone: document.getElementById('ship-phone').value,
                            address: document.getElementById('ship-address').value
                        }
                    }));

                    window.location.href = response.data.payUrl;
                } else {
                    alert("Không nhận được link thanh toán từ MoMo!");
                }
            } catch (error) {
                console.error("MoMo Error:", error);
                alert("Lỗi kết nối với MoMo. Vui lòng kiểm tra thông tin Sandbox hoặc thử lại sau.");
            }
        }

        // Gắn sự kiện nút thanh toán
        document.getElementById('btn-momo-pay').addEventListener('click', payWithMoMo);

        // Xử lý khi quay về từ MoMo
        window.addEventListener('load', async () => {
            const params = new URLSearchParams(window.location.search);
            const resultCode = params.get('resultCode');

            if (resultCode === "0") {
                const pending = JSON.parse(localStorage.getItem('pendingOrder'));
                if (pending && auth.currentUser) {
                    try {
                        await addDoc(collection(db, "orders"), {
                            userId: auth.currentUser.uid,
                            orderId: pending.orderId,
                            items: pending.items,
                            total: pending.total,
                            status: "Đã thanh toán",
                            paymentMethod: "MoMo",
                            createdAt: serverTimestamp()
                        });

                        localStorage.removeItem('pendingOrder');
                        alert("✅ Thanh toán thành công! Cảm ơn bạn đã mua hàng.");
                        window.location.href = "historyorder.html";
                    } catch (e) {
                        console.error("Lỗi lưu đơn hàng:", e);
                        alert("Thanh toán thành công nhưng chưa lưu được đơn hàng.");
                    }
                }
            } else if (resultCode !== null) {
                alert("Giao dịch không thành công hoặc bị hủy.");
            }
        });
    </script>
</body>
</html>
