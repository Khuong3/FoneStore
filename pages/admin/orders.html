<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng - FoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 bg-dark sidebar min-vh-100 p-3">
                <h4 class="text-white">Admin Panel</h4>
                <ul class="nav flex-column mt-3">
                    <li><a class="nav-link text-white" href="dashboard.html">📊 Thống kê</a></li>
                    <li><a class="nav-link text-white" href="products.html">📦 Sản phẩm</a></li>
                    <li><a class="nav-link text-white fw-bold" href="orders.html">📋 Đơn hàng</a></li>
                </ul>
            </nav>
            <main class="col-md-10 p-4">
                <h3 class="mb-4">Danh sách đơn hàng</h3>
                <div id="order-list" class="table-responsive">
                    <p>Đang tải dữ liệu...</p>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../../js/config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { doc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "../login.html"; return; }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists() || userDoc.data().role !== "admin") { window.location.href = "../../index.html"; }
        });

        async function loadOrders() {
            try {
                const snapshot = await getDocs(collection(db, "orders"));
                let html = '<table class="table table-hover bg-white border shadow-sm">';
                html += '<thead class="table-light"><tr><th>Khách hàng</th><th>Sản phẩm</th><th>Tổng tiền</th><th>Trạng thái</th><th>Hành động</th></tr></thead><tbody>';
                
                snapshot.forEach(oDoc => {
                    const o = oDoc.data();
                    const itemNames = (o.items || []).map(i => i.name).join(', ') || 'Không có SP';
                    const email = o.userEmail || o.userId || 'Không rõ';
                    
                    // CHỐNG SẬP: Tìm tiền trong mọi biến, nếu không có thì bằng 0
                    const safePrice = Number(o.totalPrice || o.amount || o.totalAmount || 0);

                    const listStatus = ["pending_payment", "Chờ xác nhận", "Đang xử lý", "Đang giao", "Hoàn thành", "Hủy"];
                    let selectHtml = `<select class="form-select form-select-sm" onchange="updateStatus('${oDoc.id}', this.value)">`;
                    listStatus.forEach(s => {
                        selectHtml += `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`;
                    });
                    selectHtml += `</select>`;

                    html += `<tr>
                        <td><small>${email}</small></td>
                        <td><small>${itemNames}</small></td>
                        <td><strong class="text-danger">${safePrice.toLocaleString()}đ</strong></td>
                        <td>${selectHtml}</td>
                        <td><span class="badge ${o.status === 'Hoàn thành' ? 'bg-success' : 'bg-warning'}">${o.status || 'N/A'}</span></td>
                    </tr>`;
                });
                
                if(snapshot.empty) html += '<tr><td colspan="5" class="text-center">Chưa có đơn hàng nào</td></tr>';
                document.getElementById('order-list').innerHTML = html + '</tbody></table>';
            } catch (err) {
                console.error("Lỗi:", err);
                document.getElementById('order-list').innerHTML = '<p class="text-danger">Lỗi khi tải đơn hàng.</p>';
            }
        }

        window.updateStatus = async (id, newStatus) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: newStatus });
                alert("Đã chuyển trạng thái sang: " + newStatus);
                loadOrders(); 
            } catch (err) { alert("Lỗi: " + err.message); }
        };

        loadOrders();
    </script>
</body>
</html>
