<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - FoneStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block bg-dark sidebar min-vh-100 p-3">
                <h4 class="text-white">Admin Panel</h4>
                <ul class="nav flex-column mt-3">
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="dashboard.html">📊 Thống kê</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="products.html">📦 Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="orders.html">📋 Đơn hàng</a></li>
                    <li class="nav-item mt-5"><a class="nav-link text-secondary" href="../../index.html">← Về trang chủ</a></li>
                </ul>
            </nav>
            
            <main class="col-md-10 p-4">
                <h2 class="mb-4">Tổng quan hệ thống</h2>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card bg-primary text-white shadow-sm p-4">
                            <h5>Tổng doanh thu</h5>
                            <h3 id="total-revenue">0đ</h3>
                            <small>Dựa trên đơn "Hoàn thành"</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-success text-white shadow-sm p-4">
                            <h5>Đơn hàng thành công</h5>
                            <h3 id="order-count">0</h3>
                            <small>Đơn đã giao xong</small>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../../js/config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        // 1. BẢO VỆ TRANG
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "../login.html"; return; }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists() || userDoc.data().role !== "admin") {
                alert("Bạn không có quyền truy cập!");
                window.location.href = "../../index.html";
            }
        });

        // 2. THỐNG KÊ
        async function loadStats() {
            try {
                // Thống kê dựa trên trạng thái "Hoàn thành"
                const q = query(collection(db, "orders"), where("status", "==", "Hoàn thành"));
                const snapshot = await getDocs(q);
                let total = 0;
                snapshot.forEach(doc => {
                    total += doc.data().totalPrice;
                });
                
                document.getElementById('total-revenue').innerText = total.toLocaleString() + 'đ';
                document.getElementById('order-count').innerText = snapshot.size;
            } catch (err) { console.error("Lỗi stats:", err); }
        }
        loadStats();
    </script>
</body>
</html>
